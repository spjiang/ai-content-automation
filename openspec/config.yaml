# OpenSpec 配置文件
version: "2.0"

project:
  name: "AI Content Automation System"
  description: "自动化内容生成与发布系统"
  
  # 技术栈定义
  tech_stack:
    backend:
      language: "python"
      python_version: "3.11"
      framework: "fastapi"
      framework_version: "0.115"
      async: true
      
    frontend:
      language: "typescript"
      language_version: "5.0"
      framework: "react"
      framework_version: "18.0"
      build_tool: "vite"
      package_manager: "pnpm"
      
    database:
      primary: "postgresql"
      version: "15"
      orm: "sqlalchemy"
      migration: "alembic"
      
    message_queue:
      broker: "rabbitmq"
      version: "3.12"
      framework: "celery"
      
    cache:
      engine: "redis"
      version: "7"
      
    container:
      engine: "docker"
      orchestration: "docker-compose"

  # 架构约束（供 OpenSpec 变更设计时引用）
  architecture:
    style: "backend-for-frontend + async-jobs"
    backend_structure:
      - "api (FastAPI routers)"
      - "application (use-cases/services)"
      - "domain (entities & business rules)"
      - "infrastructure (db/mq/external adapters)"
    frontend_structure:
      - "pages/routes"
      - "features"
      - "shared (components/hooks/utils)"
    integration_rules:
      - "Frontend only accesses backend via REST API"
      - "Long-running tasks must use Celery + RabbitMQ"
      - "All persistent business data must be stored in PostgreSQL"
      - "Compose is the default local runtime environment"
      - "Service-to-service config via environment variables only"

  # 开发规范（供 OpenSpec proposal/design/tasks 统一约束）
  standards:
    backend:
      lint: ["ruff", "black", "isort"]
      typing: "mypy --strict"
      testing: ["pytest", "pytest-asyncio"]
    frontend:
      lint: ["eslint", "prettier"]
      testing: ["vitest", "react-testing-library"]
    api:
      standard: "OpenAPI 3.1"
      versioning: "path-versioning (/api/v1)"
    data:
      migration: "alembic only"
      transaction_policy: "write operations must be transactional"
    queue:
      retry_policy: "exponential-backoff"
      idempotency_required: true
    container:
      required_services: ["backend", "frontend", "postgres", "rabbitmq", "redis", "worker"]
      healthcheck_required: true
      
  # 端口规划
  ports:
    backend: 8000
    frontend: 5173
    frontend_prod: 80
    postgres: 5432
    rabbitmq_amqp: 5672
    rabbitmq_management: 15672
    redis: 6379
    celery_flower: 5555
    pgadmin: 5050

# 规范模板
templates:
  spec: "templates/spec.md.j2"
  plan: "templates/plan.md.j2"
  tasks: "templates/tasks.md.j2"

# 验证规则
validation:
  enforce_type_hints: true
  enforce_tests: true
  max_task_duration_minutes: 30